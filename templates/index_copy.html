<!DOCTYPE html>
<!-- 2026/4/16までに作成した、pythonを考慮したコード -->
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>Todoアプリ</h1>

        <!-- タスク追加フォーム -->
        <form method="POST" action="/add">
            <input type="text" name="title" id="title" placeholder="Add Todo" required>
            <button type="submit">Add</button>
        </form>

        <!-- スクロール先 -->
        <h2 id="morning">朝(8:00-12:00)</h2>
        <h2 id="afternoon">昼(12:00-18:00)</h2>
        <h2 id="night">夜(18:00-24:00)</h2>

        <!-- タスク一覧 -->
        <h2>タスク一覧</h2>
        <ul>
            {% for todo in todo_list %}
            <li>
                {{ todo.title }} ({{ todo.time_slot }})

                <!-- タスク移動フォーム -->
                <form method="POST" action="/move/{{ todo.id }}" style="display:inline;">
                    <input type="hidden" name="slot" value="朝">
                    <button type="submit">朝</button>
                </form>
                <form method="POST" action="/move/{{ todo.id }}" style="display:inline;">
                    <input type="hidden" name="slot" value="昼">
                    <button type="submit">昼</button>
                </form>
                <form method="POST" action="/move/{{ todo.id }}" style="display:inline;">
                    <input type="hidden" name="slot" value="夜">
                    <button type="submit">夜</button>
                </form>

                <!-- 削除フォーム -->
                <form method="POST" action="/delete/{{ todo.id }}">
                    <button type="submit">Delete</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
